<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de Ciencias I — Guía del Estudiante</title>
<style>
:root{
  --bg:#f7f9f7;
  --surface:#ffffff;
  --surface2:#eef2ee;
  --border:#dde4dd;
  --text:#1a2e1a;
  --muted:#5a6b5a;
  --r:14px;--rs:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:17px}

/* TOP BAR */
.topbar{background:var(--surface);border-bottom:2px solid var(--border);padding:.75rem 1rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:17px;font-weight:800;color:var(--text)}
.topbar-sub{font-size:13px;color:var(--muted);font-weight:600}

/* SESSION NAV */
.sess-nav{display:flex;gap:7px;padding:.85rem 1rem;overflow-x:auto;background:var(--surface);border-bottom:2px solid var(--border);scrollbar-width:none}
.sess-nav::-webkit-scrollbar{display:none}
.snav-btn{flex-shrink:0;padding:.42rem 1rem;border-radius:20px;border:2px solid var(--border);background:transparent;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}
.snav-btn.active{color:#fff;border-color:transparent}

/* PROGRESS */
.prog-wrap{height:6px;background:var(--border)}
.prog-fill{height:100%;transition:width .3s}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:1rem}

/* SESSION HEADER */
.sess-header{border-radius:var(--r);overflow:hidden;margin-bottom:1.1rem;border:2px solid var(--border)}
.sess-header-img{width:100%;height:130px;object-fit:cover;object-position:center;display:block}
.sess-header-body{padding:.9rem 1.1rem}
.sess-num{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;margin-bottom:.25rem}
.sess-title{font-size:24px;font-weight:900;margin-bottom:.4rem}
.sess-steps{display:flex;gap:6px;flex-wrap:wrap;margin-top:.35rem}
.sess-step{font-size:13px;font-weight:700;padding:5px 12px;border-radius:20px;border:2px solid;display:flex;align-items:center;gap:5px}

/* STEP TABS — large, clear */
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:1.1rem}
.tab-btn{padding:.65rem .5rem;border:2px solid var(--border);background:var(--surface);font-size:15px;font-weight:700;color:var(--muted);border-radius:var(--rs);cursor:pointer;transition:all .15s;text-align:center;line-height:1.3}
.tab-btn.active{color:#fff;border-color:transparent}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* WORD BANK — always visible in practice and review */
.word-bank{background:#fffbea;border:2px solid #e8c840;border-radius:var(--r);padding:.85rem 1rem;margin-bottom:1rem}
.wb-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#7a6000;margin-bottom:.5rem}
.wb-words{display:flex;flex-wrap:wrap;gap:6px}
.wb-word{font-size:14px;font-weight:700;padding:4px 12px;background:#fff;border:2px solid #e8c840;border-radius:20px;color:#5a4400}

/* CONCEPT CARDS — simplified */
.concept-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:1.1rem 1.15rem;margin-bottom:.85rem}
.concept-num{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem}
.concept-title{font-size:20px;font-weight:800;margin-bottom:.65rem;display:flex;align-items:center;gap:8px}
.concept-title img{width:30px;height:30px;object-fit:cover;border-radius:7px;flex-shrink:0}

/* DEFINITION BOX */
.def-box{background:var(--surface2);border-left:4px solid;border-radius:0 var(--rs) var(--rs) 0;padding:.8rem 1rem;margin-bottom:.75rem}
.def-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem;opacity:.7}
.def-text{font-size:17px;line-height:1.6;font-weight:500}
.def-text strong{font-weight:800}

/* EXAMPLE BOX */
.ex-box{background:#f0f9f4;border:2px solid #1d9e7540;border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:.75rem}
.ex-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#0f6e56;margin-bottom:.3rem}
.ex-text{font-size:16px;font-weight:600;color:#0f6e56;line-height:1.5}

/* NOT / YES comparison */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:.75rem}
.compare-col{border-radius:var(--rs);padding:.75rem .9rem;border:2px solid}
.compare-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.45rem}
.compare-item{font-size:15px;padding:3px 0;font-weight:500;line-height:1.4}

/* TABLE */
.tbl-wrap{overflow-x:auto;margin-bottom:.75rem}
table{width:100%;border-collapse:collapse;font-size:15px}
th{background:var(--surface2);padding:.5rem .7rem;text-align:left;font-weight:800;font-size:13px;border-bottom:2px solid var(--border);color:var(--muted)}
td{padding:.45rem .7rem;border-bottom:1.5px solid var(--border);vertical-align:top;line-height:1.45;font-weight:500}
tr:last-child td{border-bottom:none}

/* QUIZ — large tap targets */
.score-bar{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:.85rem 1.1rem;margin-bottom:.85rem;display:flex;align-items:center;gap:12px}
.score-icon{font-size:26px}
.score-label{font-size:14px;color:var(--muted);font-weight:600}
.score-val{font-size:20px;font-weight:800}
.q-block{margin-bottom:1rem}
.q-num{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem}
.q-text{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:.75rem}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--surface2);border:2px solid var(--border);border-radius:var(--rs);padding:.75rem 1rem;text-align:left;font-size:16px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;line-height:1.4;width:100%}
.opt:hover:not(:disabled){border-color:#9ca3af;background:#f0f2f0}
.opt.correct{background:#e1f5ee;border-color:#1d9e75;color:#085041}
.opt.wrong{background:#fee2e2;border-color:#ef4444;color:#7f1d1d}
.opt:disabled{cursor:default}
.hint{font-size:15px;margin-top:.5rem;padding:.55rem .85rem;border-radius:var(--rs);display:none;line-height:1.5;font-weight:600}
.hint.show{display:block}
.hint.ok{background:#e1f5ee;color:#085041;border:1.5px solid #1d9e75}
.hint.no{background:#fee2e2;color:#7f1d1d;border:1.5px solid #ef4444}
.q-sep{border:none;border-top:2px solid var(--border);margin:1rem 0}

/* NOTEBOOK — step by step */
.step-intro{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:1rem 1.15rem;margin-bottom:.85rem}
.step-intro p{font-size:16px;color:var(--muted);line-height:1.6;font-weight:500}
.nb-block{background:var(--surface);border:2px dashed var(--border);border-radius:var(--r);padding:1.1rem 1.15rem;margin-bottom:.85rem}
.nb-step-num{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-size:14px;font-weight:800;color:#fff;margin-bottom:.5rem;flex-shrink:0}
.nb-task{font-size:17px;font-weight:700;color:var(--text);line-height:1.55;margin-bottom:.75rem}
.nb-cols{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.5rem}
.nb-col-label{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.05em}
.line{border-bottom:2px solid var(--border);height:30px;margin-bottom:4px}
.reminder-box{background:#fff8e6;border:2px solid #e8c840;border-radius:var(--rs);padding:.75rem 1rem;margin-top:.75rem}
.reminder-box p{font-size:14px;color:#7a6000;font-weight:600;line-height:1.5}

/* FOOTER */
.footer{text-align:center;padding:2rem 1rem;font-size:13px;color:var(--muted);font-weight:500}

@media(max-width:480px){
  .compare{grid-template-columns:1fr}
  .nb-cols{grid-template-columns:1fr}
  .sess-title{font-size:20px}
  .tab-btn{font-size:13px;padding:.55rem .3rem}
}
</style>
</head>

let curSess=0;
const scores={};
const answered={};

function buildNav(){
  const nav=document.getElementById('sessNav');
  SESSIONS.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='snav-btn'+(i===0?' active':'');
    btn.textContent=`${s.emoji} ${s.id}. ${s.title}`;
    if(i===0){btn.style.background=s.color;btn.style.borderColor=s.color;}
    btn.onclick=()=>loadSession(i);
    nav.appendChild(btn);
  });
}

function loadSession(idx){
  curSess=idx;
  const s=SESSIONS[idx];
  if(!scores[idx])scores[idx]={correct:0,total:s.quiz.length,answered:0};
  if(!answered[idx])answered[idx]={};

  document.querySelectorAll('.snav-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',i===idx);
    btn.style.background=i===idx?s.color:'';
    btn.style.borderColor=i===idx?s.color:'';
    btn.style.color=i===idx?'#fff':'';
  });

  updateProgress(idx);

  const main=document.getElementById('mainContent');
  main.innerHTML=`
    <div class="sess-header" style="border-color:${s.color}50">
      <img src="${s.img}" class="sess-header-img" alt="${s.title}" onerror="this.style.display='none'" loading="lazy">
      <div class="sess-header-body" style="background:${s.color}12">
        <div class="sess-num" style="color:${s.color}">Sesión ${s.id} de ${SESSIONS.length} · ${s.dur}</div>
        <div class="sess-title">${s.emoji} ${s.title}</div>
        <div class="sess-steps">
          <div class="sess-step" style="background:${s.color}15;border-color:${s.color}40;color:${s.color}">📖 Paso 1: Aprender</div>
          <div class="sess-step" style="background:${s.color}15;border-color:${s.color}40;color:${s.color}">✏️ Paso 2: Practicar</div>
          <div class="sess-step" style="background:${s.color}15;border-color:${s.color}40;color:${s.color}">📓 Paso 3: Cuaderno</div>
        </div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('aprender',this,${idx})" style="border-color:${s.color}">📖 Paso 1<br>Aprender</button>
      <button class="tab-btn" onclick="switchTab('practicar',this,${idx})">✏️ Paso 2<br>Practicar</button>
      <button class="tab-btn" onclick="switchTab('cuaderno',this,${idx})">📓 Paso 3<br>Cuaderno</button>
    </div>
    <div id="pane-aprender-${idx}" class="tab-pane active">${buildAprender(s)}</div>
    <div id="pane-practicar-${idx}" class="tab-pane">${buildPracticar(s,idx)}</div>
    <div id="pane-cuaderno-${idx}" class="tab-pane">${buildCuaderno(s,idx)}</div>
  `;

  // set active tab color
  document.querySelector('.tab-btn.active').style.background=s.color;
  document.querySelector('.tab-btn.active').style.color='#fff';
  document.querySelector('.tab-btn.active').style.borderColor=s.color;

  restoreAnswers(idx);
}

function switchTab(name,btn,idx){
  const s=SESSIONS[idx];
  document.querySelectorAll(`[id^="pane-"][id$="-${idx}"]`).forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.remove('active');
    b.style.background='';b.style.color='';b.style.borderColor=s.color+'40';
  });
  document.getElementById(`pane-${name}-${idx}`).classList.add('active');
  btn.classList.add('active');
  btn.style.background=s.color;btn.style.color='#fff';btn.style.borderColor=s.color;
}

function wordBank(s){
  return`<div class="word-bank">
    <div class="wb-label">📚 Banco de palabras</div>
    <div class="wb-words">${s.palabras.map(p=>`<span class="wb-word">${p}</span>`).join('')}</div>
  </div>`;
}

function buildAprender(s){
  let html=wordBank(s);
  s.conceptos.forEach((c,ci)=>{
    let inner=`<div class="def-box" style="border-color:${s.color}">
      <div class="def-label" style="color:${s.color}">📌 Definición</div>
      <div class="def-text">${c.def}</div>
    </div>`;
    if(c.ejemplo)inner+=`<div class="ex-box">
      <div class="ex-label">💡 Ejemplo</div>
      <div class="ex-text">${c.ejemplo}</div>
    </div>`;
    if(c.no)inner+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem">
      <div style="background:#fee2e2;border:2px solid #ef4444;border-radius:var(--rs);padding:.65rem .85rem">
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;color:#7f1d1d;margin-bottom:.3rem">❌ No es esto</div>
        <div style="font-size:14px;color:#7f1d1d;font-weight:600;line-height:1.4">${c.no}</div>
      </div>
      <div style="background:#e1f5ee;border:2px solid #1d9e75;border-radius:var(--rs);padding:.65rem .85rem">
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;color:#085041;margin-bottom:.3rem">✓ Sí es esto</div>
        <div style="font-size:14px;color:#085041;font-weight:600;line-height:1.4">${c.si}</div>
      </div>
    </div>`;
    if(c.comparar){
      const L=c.comparar.izq,R=c.comparar.der;
      inner+=`<div class="compare">
        <div class="compare-col" style="background:${L.color}12;border-color:${L.color}40">
          <div class="compare-label" style="color:${L.color}">${L.label}</div>
          ${L.items.map(i=>`<div class="compare-item">· ${i}</div>`).join('')}
        </div>
        ${R?`<div class="compare-col" style="background:${R.color}12;border-color:${R.color}40">
          <div class="compare-label" style="color:${R.color}">${R.label}</div>
          ${R.items.map(i=>`<div class="compare-item">· ${i}</div>`).join('')}
        </div>`:''}
      </div>`;
    }
    if(c.tabla)inner+=`<div class="tbl-wrap"><table><tr>${c.tabla.cols.map(col=>`<th>${col}</th>`).join('')}</tr>${c.tabla.filas.map(f=>`<tr>${f.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('')}</table></div>`;

    html+=`<div class="concept-card">
      <div class="concept-num" style="color:${s.color}">Concepto ${ci+1} de ${s.conceptos.length}</div>
      <div class="concept-title" style="color:${s.color}">
        <img src="${c.img}" alt="" onerror="this.style.display='none'" loading="lazy">
        ${c.emoji} ${c.titulo}
      </div>
      ${inner}
    </div>`;
  });
  return html;
}

function buildPracticar(s,idx){
  const bar=`<div class="score-bar">
    <div class="score-icon">🏆</div>
    <div>
      <div class="score-label">Tu puntaje</div>
      <div class="score-val" id="score-${idx}">Responde las preguntas para ver tu puntaje</div>
    </div>
  </div>`;
  const wb=wordBank(s);
  const qs=s.quiz.map((q,qi)=>`
    <div class="q-block">
      <div class="q-num">Pregunta ${qi+1} de ${s.quiz.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts" id="opts-${idx}-${qi}">
        ${q.opts.map((o,oi)=>`<button class="opt" onclick="checkAns(${idx},${qi},${oi})" id="opt-${idx}-${qi}-${oi}">${o}</button>`).join('')}
      </div>
      <div class="hint" id="hint-${idx}-${qi}"></div>
    </div>
    ${qi<s.quiz.length-1?'<hr class="q-sep">':''}
  `).join('');
  return bar+wb+`<div class="concept-card">${qs}</div>`;
}

function buildCuaderno(s,idx){
  const intro=`<div class="step-intro">
    <p>📓 Estas actividades las haces en tu cuaderno.<br>Lee cada instrucción con calma. Haz una tarea a la vez.</p>
  </div>`;
  const wb=wordBank(s);
  const tareas=s.cuaderno.map((nb,ni)=>{
    let lines='';
    if(nb.cols){
      lines=`<div class="nb-cols">${nb.cols.map(col=>`<div><div class="nb-col-label">${col}</div>${Array(3).fill('<div class="line"></div>').join('')}</div>`).join('')}</div>`;
    } else {
      lines=Array(nb.lineas).fill('<div class="line"></div>').join('');
    }
    const rec=nb.recordatorio?`<div class="reminder-box"><p>💡 ${nb.recordatorio}</p></div>`:'';
    return`<div class="nb-block">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:.6rem">
        <div class="nb-step-num" style="background:${s.color}">${ni+1}</div>
        <div class="nb-task">${nb.tarea.replace(/\n/g,'<br>')}</div>
      </div>
      ${rec}
      <div style="margin-top:.65rem">${lines}</div>
    </div>`;
  }).join('');
  return intro+wb+tareas;
}

function checkAns(idx,qi,oi){
  if(answered[idx][qi]!==undefined)return;
  answered[idx][qi]=oi;
  const s=SESSIONS[idx];
  const q=s.quiz[qi];
  const correct=oi===q.ans;
  if(correct)scores[idx].correct++;
  scores[idx].answered++;

  document.querySelectorAll(`#opts-${idx}-${qi} .opt`).forEach(b=>b.disabled=true);
  document.getElementById(`opt-${idx}-${qi}-${oi}`).classList.add(correct?'correct':'wrong');
  if(!correct)document.getElementById(`opt-${idx}-${qi}-${q.ans}`).classList.add('correct');

  const hint=document.getElementById(`hint-${idx}-${qi}`);
  hint.textContent=correct?q.ok:q.no;
  hint.className='hint show '+(correct?'ok':'no');

  updateProgress(idx);
  const sc=scores[idx];
  const sdEl=document.getElementById(`score-${idx}`);
  if(sdEl){
    sdEl.textContent=sc.answered===sc.total
      ?`${sc.correct} / ${sc.total} correctas (${Math.round(sc.correct/sc.total*100)}%)`
      :`${sc.answered} de ${sc.total} respondidas`;
  }
}

function restoreAnswers(idx){
  if(!answered[idx])return;
  Object.entries(answered[idx]).forEach(([qi,oi])=>{
    const s=SESSIONS[idx];const q=s.quiz[qi];
    document.querySelectorAll(`#opts-${idx}-${qi} .opt`).forEach(b=>b.disabled=true);
    const chosen=document.getElementById(`opt-${idx}-${qi}-${oi}`);
    if(chosen)chosen.classList.add(parseInt(oi)===q.ans?'correct':'wrong');
    if(parseInt(oi)!==q.ans){const corr=document.getElementById(`opt-${idx}-${qi}-${q.ans}`);if(corr)corr.classList.add('correct');}
    const hint=document.getElementById(`hint-${idx}-${qi}`);
    if(hint){const correct=parseInt(oi)===q.ans;hint.textContent=correct?q.ok:q.no;hint.className='hint show '+(correct?'ok':'no');}
  });
  const sc=scores[idx];
  if(sc&&sc.answered>0){
    const sdEl=document.getElementById(`score-${idx}`);
    if(sdEl)sdEl.textContent=sc.answered===sc.total
      ?`${sc.correct} / ${sc.total} correctas (${Math.round(sc.correct/sc.total*100)}%)`
      :`${sc.answered} de ${sc.total} respondidas`;
  }
}

function updateProgress(idx){
  const sc=scores[idx];if(!sc)return;
  const pct=Math.round(sc.answered/sc.total*100);
  const fill=document.getElementById('progFill');
  fill.style.width=pct+'%';fill.style.background=SESSIONS[idx].color;
}

buildNav();loadSession(0);
</script>
