<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Workshop I — Student Guide</title>
<style>
:root{
  --bg:#f8faf9;
  --surface:#ffffff;
  --surface2:#f0f2f0;
  --border:#e2e6e2;
  --text:#111827;
  --muted:#6b7280;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* TOP BAR */
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:700;color:var(--text)}
.topbar-sub{font-size:12px;color:var(--muted)}

/* SESSION NAV */
.sess-nav{display:flex;gap:6px;padding:.75rem 1rem;overflow-x:auto;background:var(--surface);border-bottom:1.5px solid var(--border);scrollbar-width:none}
.sess-nav::-webkit-scrollbar{display:none}
.snav-btn{flex-shrink:0;padding:.38rem .9rem;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}
.snav-btn.active{color:#fff;border-color:transparent}

/* PROGRESS */
.prog-wrap{height:5px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;transition:width .3s}

/* MAIN */
.main{max-width:700px;margin:0 auto;padding:1rem}

/* SESSION HEADER */
.sess-header{border-radius:var(--r);overflow:hidden;margin-bottom:1rem;border:1.5px solid var(--border)}
.sess-header-img{width:100%;height:140px;object-fit:cover;object-position:center;display:block}
.sess-header-body{padding:.9rem 1.1rem}
.sess-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem;opacity:.75}
.sess-title{font-size:22px;font-weight:800;margin-bottom:.2rem}
.sess-meta{font-size:13px;color:var(--muted);font-weight:500}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:4px}
.tab-btn{flex:1;padding:.42rem .5rem;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--muted);border-radius:7px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08);border:1.5px solid var(--border)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* CARDS */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:1rem 1.15rem;margin-bottom:.75rem}
.card-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:.5rem;display:flex;align-items:center;gap:8px}
.card-title img{width:28px;height:28px;object-fit:cover;border-radius:6px;opacity:.85;flex-shrink:0}
.card-body{font-size:15px;color:#374151;line-height:1.65}
.card-body strong{color:var(--text);font-weight:700}

/* TERMS */
.terms{display:flex;flex-wrap:wrap;gap:6px;margin-top:.65rem}
.term{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;border:1.5px solid}

/* SPLIT */
.split-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:.65rem}
.split-col{border-radius:var(--rs);padding:.7rem .85rem;border:1.5px solid}
.split-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.split-item{font-size:14px;padding:2px 0;font-weight:500}

/* TABLE */
.tbl-wrap{overflow-x:auto;margin-top:.65rem}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--surface2);padding:.45rem .65rem;text-align:left;font-weight:700;font-size:12px;border-bottom:1.5px solid var(--border);color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
td{padding:.4rem .65rem;border-bottom:1px solid var(--border);color:#374151;vertical-align:top;line-height:1.4}
tr:last-child td{border-bottom:none}

/* EXAMPLE */
.example{margin-top:.65rem;background:var(--surface2);border-left:3px solid;border-radius:0 var(--rs) var(--rs) 0;padding:.55rem .8rem;font-size:14px;color:var(--muted);font-style:italic;font-weight:500}

/* QUIZ */
.score-bar{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:.85rem 1.1rem;margin-bottom:.75rem;display:flex;align-items:center;gap:12px}
.score-icon{font-size:24px}
.score-label{font-size:13px;color:var(--muted);font-weight:500}
.score-val{font-size:18px;font-weight:800;color:var(--text)}
.q-block{margin-bottom:.85rem}
.q-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.3rem}
.q-text{font-size:15px;font-weight:700;color:var(--text);margin-bottom:.6rem;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);padding:.55rem .85rem;text-align:left;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;line-height:1.4;width:100%}
.opt:hover:not(:disabled){border-color:#9ca3af;background:#f3f4f6}
.opt.correct{background:#e1f5ee;border-color:#1d9e75;color:#085041}
.opt.wrong{background:#fee2e2;border-color:#ef4444;color:#7f1d1d}
.opt:disabled{cursor:default}
.hint{font-size:13px;margin-top:.4rem;padding:.4rem .7rem;border-radius:var(--rs);display:none;line-height:1.4;font-weight:500}
.hint.show{display:block}
.hint.ok{background:#e1f5ee;color:#085041}
.hint.no{background:#fee2e2;color:#7f1d1d}
.q-sep{border:none;border-top:1px solid var(--border);margin:.85rem 0}

/* NOTEBOOK */
.nb-block{background:var(--surface);border:2px dashed var(--border);border-radius:var(--r);padding:1rem 1.15rem;margin-bottom:.75rem}
.nb-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.3rem}
.nb-task{font-size:15px;font-weight:600;color:var(--text);line-height:1.55;margin-bottom:.6rem}
.nb-cols{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.5rem}
.nb-col-label{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:.25rem;text-transform:uppercase;letter-spacing:.05em}
.line{border-bottom:1.5px solid var(--border);height:28px;margin-bottom:3px}

/* FOOTER */
.footer{text-align:center;padding:2rem 1rem;font-size:12px;color:var(--muted)}

@media(max-width:480px){
  .split-grid{grid-template-columns:1fr}
  .nb-cols{grid-template-columns:1fr}
  .sess-title{font-size:19px}
  .tab-btn{font-size:12px;padding:.4rem .3rem}
  .sess-header-img{height:110px}
}
</style>
</head>

let curSess=0;
const scores={};
const answered={};

function buildNav(){
  const nav=document.getElementById('sessNav');
  SESSIONS.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='snav-btn'+(i===0?' active':'');
    btn.textContent=`${s.emoji} ${s.id}. ${s.title}`;
    if(i===0){btn.style.background=s.color;btn.style.borderColor=s.color;}
    btn.onclick=()=>loadSession(i);
    nav.appendChild(btn);
  });
}

function loadSession(idx){
  curSess=idx;
  const s=SESSIONS[idx];
  if(!scores[idx])scores[idx]={correct:0,total:s.quiz.length,answered:0};
  if(!answered[idx])answered[idx]={};

  document.querySelectorAll('.snav-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',i===idx);
    btn.style.background=i===idx?s.color:'';
    btn.style.borderColor=i===idx?s.color:'';
    btn.style.color=i===idx?'#fff':'';
  });

  updateProgress(idx);

  const main=document.getElementById('mainContent');
  main.innerHTML=`
    <div class="sess-header" style="border-color:${s.color}40">
      <img src="${s.img}" class="sess-header-img" alt="${s.title}" onerror="this.style.display='none'" loading="lazy">
      <div class="sess-header-body" style="background:${s.color}10">
        <div class="sess-eyebrow" style="color:${s.color}">Session ${s.id} of ${SESSIONS.length} · ${s.dur}</div>
        <div class="sess-title">${s.emoji} ${s.title}</div>
        <div class="sess-meta">${s.exam}</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('review',this,${idx})">📖 Review</button>
      <button class="tab-btn" onclick="switchTab('practice',this,${idx})">✏️ Practice</button>
      <button class="tab-btn" onclick="switchTab('notebook',this,${idx})">📓 Notebook</button>
    </div>
    <div id="pane-review-${idx}" class="tab-pane active">${buildReview(s)}</div>
    <div id="pane-practice-${idx}" class="tab-pane">${buildPractice(s,idx)}</div>
    <div id="pane-notebook-${idx}" class="tab-pane">${buildNotebook(s)}</div>
  `;
  restoreAnswers(idx);
}

function switchTab(name,btn,idx){
  document.querySelectorAll(`[id^="pane-"][id$="-${idx}"]`).forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`pane-${name}-${idx}`).classList.add('active');
  btn.classList.add('active');
}

function buildReview(s){
  return s.concepts.map(c=>{
    let inner=`<div class="card-body">${c.body}</div>`;
    if(c.terms)inner+=`<div class="terms">${c.terms.map(t=>`<span class="term" style="background:${s.color}12;color:${s.color};border-color:${s.color}40">${t}</span>`).join('')}</div>`;
    if(c.example)inner+=`<div class="example" style="border-color:${s.color}">${c.example}</div>`;
    if(c.split){
      const L=c.split.left,R=c.split.right;
      inner+=`<div class="split-grid">
        <div class="split-col" style="background:${L.color}12;border-color:${L.color}40">
          <div class="split-label" style="color:${L.color}">${L.label}</div>
          ${L.items.map(i=>`<div class="split-item">· ${i}</div>`).join('')}
        </div>
        ${R?`<div class="split-col" style="background:${R.color}12;border-color:${R.color}40">
          <div class="split-label" style="color:${R.color}">${R.label}</div>
          ${R.items.map(i=>`<div class="split-item">· ${i}</div>`).join('')}
        </div>`:''}
      </div>`;
    }
    if(c.table)inner+=`<div class="tbl-wrap"><table><tr>${c.table.cols.map(col=>`<th>${col}</th>`).join('')}</tr>${c.table.rows.map(row=>`<tr>${row.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('')}</table></div>`;
    return`<div class="card">
      <div class="card-title"><img src="${c.img}" alt="" onerror="this.style.display='none'" loading="lazy" style="width:28px;height:28px;object-fit:cover;border-radius:6px;opacity:.85;flex-shrink:0"><span style="color:${s.color}">${c.emoji} ${c.title}</span></div>
      ${inner}
    </div>`;
  }).join('');
}

function buildPractice(s,idx){
  const bar=`<div class="score-bar">
    <div class="score-icon">🏆</div>
    <div>
      <div class="score-label">Practice score</div>
      <div class="score-val" id="score-${idx}">Answer questions to see your score</div>
    </div>
  </div>`;
  const qs=s.quiz.map((q,qi)=>`
    <div class="q-block">
      <div class="q-num">Question ${qi+1} of ${s.quiz.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts" id="opts-${idx}-${qi}">
        ${q.opts.map((o,oi)=>`<button class="opt" onclick="checkAns(${idx},${qi},${oi})" id="opt-${idx}-${qi}-${oi}">${o}</button>`).join('')}
      </div>
      <div class="hint" id="hint-${idx}-${qi}"></div>
    </div>
    ${qi<s.quiz.length-1?'<hr class="q-sep">':''}
  `).join('');
  return bar+`<div class="card">${qs}</div>`;
}

function buildNotebook(s){
  return s.notebook.map((nb,ni)=>{
    let lines='';
    if(nb.cols){
      lines=`<div class="nb-cols">${nb.cols.map(col=>`<div><div class="nb-col-label">${col}</div>${Array(2).fill('<div class="line"></div>').join('')}</div>`).join('')}</div>`;
    } else {
      lines=Array(nb.lines).fill('<div class="line"></div>').join('');
    }
    return`<div class="nb-block">
      <div class="nb-num">Task ${ni+1}</div>
      <div class="nb-task">${nb.task}</div>
      ${lines}
    </div>`;
  }).join('');
}

function checkAns(idx,qi,oi){
  if(answered[idx][qi]!==undefined)return;
  answered[idx][qi]=oi;
  const s=SESSIONS[idx];
  const correct=oi===s.quiz[qi].ans;
  if(correct)scores[idx].correct++;
  scores[idx].answered++;

  document.querySelectorAll(`#opts-${idx}-${qi} .opt`).forEach(b=>b.disabled=true);
  document.getElementById(`opt-${idx}-${qi}-${oi}`).classList.add(correct?'correct':'wrong');
  if(!correct)document.getElementById(`opt-${idx}-${qi}-${s.quiz[qi].ans}`).classList.add('correct');

  const hint=document.getElementById(`hint-${idx}-${qi}`);
  hint.textContent=s.quiz[qi].hint;
  hint.className='hint show '+(correct?'ok':'no');

  updateProgress(idx);
  const sc=scores[idx];
  const sdEl=document.getElementById(`score-${idx}`);
  if(sdEl){
    sdEl.textContent=sc.answered===sc.total
      ?`${sc.correct} / ${sc.total} correct (${Math.round(sc.correct/sc.total*100)}%)`
      :`${sc.answered} of ${sc.total} answered`;
  }
}

function restoreAnswers(idx){
  if(!answered[idx])return;
  Object.entries(answered[idx]).forEach(([qi,oi])=>{
    const s=SESSIONS[idx];
    const q=s.quiz[qi];
    document.querySelectorAll(`#opts-${idx}-${qi} .opt`).forEach(b=>b.disabled=true);
    const chosen=document.getElementById(`opt-${idx}-${qi}-${oi}`);
    if(chosen)chosen.classList.add(parseInt(oi)===q.ans?'correct':'wrong');
    if(parseInt(oi)!==q.ans){
      const corr=document.getElementById(`opt-${idx}-${qi}-${q.ans}`);
      if(corr)corr.classList.add('correct');
    }
    const hint=document.getElementById(`hint-${idx}-${qi}`);
    if(hint){hint.textContent=q.hint;hint.className='hint show '+(parseInt(oi)===q.ans?'ok':'no');}
  });
  const sc=scores[idx];
  if(sc&&sc.answered>0){
    const sdEl=document.getElementById(`score-${idx}`);
    if(sdEl)sdEl.textContent=sc.answered===sc.total
      ?`${sc.correct} / ${sc.total} correct (${Math.round(sc.correct/sc.total*100)}%)`
      :`${sc.answered} of ${sc.total} answered`;
  }
}

function updateProgress(idx){
  const sc=scores[idx];
  if(!sc)return;
  const pct=Math.round(sc.answered/sc.total*100);
  const fill=document.getElementById('progFill');
  fill.style.width=pct+'%';
  fill.style.background=SESSIONS[idx].color;
}

buildNav();
loadSession(0);
</script>
</body>
